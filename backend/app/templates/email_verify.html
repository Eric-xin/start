<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Verify Your CardEcon Account</title>
  <style>
    body { background: #0f0f0f; color: #e0e0e0; font-family: 'Inter', Arial, sans-serif; margin: 0; padding: 40px 20px; }
    .container { max-width: 560px; margin: 0 auto; }
    .header { font-size: 24px; font-weight: 700; color: #0a6cf5; letter-spacing: 2px; margin-bottom: 8px; }
    .subtitle { font-size: 12px; color: #555; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
    .card { background: #1a1a2e; border: 1px solid #1e3a5f; border-radius: 8px; padding: 32px; }
    h2 { color: #ffffff; font-size: 20px; margin-top: 0; }
    p { color: #b0b0b0; line-height: 1.6; }
    .cta { display: inline-block; margin: 24px 0; padding: 14px 32px; background: #0a6cf5; color: #ffffff; text-decoration: none; border-radius: 4px; font-weight: 600; font-size: 14px; letter-spacing: 1px; }
    .footer { margin-top: 32px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">CARDECON</div>
    <div class="subtitle">Financial Education Platform</div>
    <div class="card">
      <h2>Welcome, {{ username }}</h2>
      <p>Your account has been created. Verify your email to start your investor journey.</p>
      <a href="{{ verify_url }}" class="cta">VERIFY EMAIL</a>
      <p style="font-size: 12px;">Or copy this link: {{ verify_url }}</p>
      <p style="font-size: 12px; color: #666;">This link expires in 24 hours.</p>
    </div>
    <div class="footer">CardEcon &mdash; Learn to invest by deciding.</div>
  </div>
</body>
</html>
